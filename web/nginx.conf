server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Same-origin proxy for Firebase Auth redirect flow (required on custom domains;
    # see https://firebase.google.com/docs/auth/web/redirect-best-practices).
    # ^~ beats the static *.js regex below — otherwise handler.js / iframe.js 404.
    location ^~ /__/auth {
        proxy_pass https://ttf-restaurant-dev.firebaseapp.com;
        proxy_ssl_server_name on;
        proxy_set_header Host ttf-restaurant-dev.firebaseapp.com;
    }

    location ^~ /__/firebase {
        proxy_pass https://ttf-restaurant-dev.firebaseapp.com;
        proxy_ssl_server_name on;
        proxy_set_header Host ttf-restaurant-dev.firebaseapp.com;
    }

    location / {
        # Required for signInWithPopup when VITE_GOOGLE_AUTH_USE_POPUP=true.
        add_header Cross-Origin-Opener-Policy "same-origin-allow-popups" always;
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
}
