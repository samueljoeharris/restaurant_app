server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index admin.html;
    underscores_in_headers on;
    large_client_header_buffers 4 32k;

    location / {
        # CSP is set on the HTML document only; the browser applies the
        # document's policy to every subresource it loads, so the static-asset
        # location below intentionally does NOT repeat this header.
        # Google Maps JS API allowlist CSP — https://developers.google.com/maps/documentation/javascript/content-security-policy
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' blob: https://*.googleapis.com https://*.gstatic.com https://*.ggpht.com https://*.googleusercontent.com *.google.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https://*.googleapis.com https://*.gstatic.com https://*.googleusercontent.com *.google.com https://api.qrserver.com; connect-src 'self' data: blob: https://api.dev.littlescout.app https://api.littlescout.app https://identitytoolkit.googleapis.com https://securetoken.googleapis.com https://firebaseappcheck.googleapis.com https://firebasevertexai.googleapis.com https://*.googleapis.com https://*.gstatic.com *.google.com; frame-src 'self' https://*.firebaseapp.com *.google.com; worker-src blob:; base-uri 'self'; form-action 'self'; object-src 'none'; frame-ancestors 'none'" always;
        try_files $uri $uri/ /admin.html;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
}
