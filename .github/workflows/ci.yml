name: CI

# Solo dev: push to main only (no PR workflow). Path-filtered web/api Docker builds.
on:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      web: ${{ steps.filter.outputs.web }}
      api: ${{ steps.filter.outputs.api }}
    steps:
      - uses: actions/checkout@v6

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            web:
              - 'web/**'
              - '.github/workflows/ci.yml'
            api:
              - 'api/**'
              - '.github/workflows/ci.yml'

  web-build:
    name: Web build
    needs: changes
    if: needs.changes.outputs.web == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Docker build (matches Cloud Run image)
        run: |
          docker build \
            --build-arg VITE_API_URL=https://ci.example.com \
            --build-arg VITE_FIREBASE_API_KEY=ci-dummy \
            --build-arg VITE_FIREBASE_AUTH_DOMAIN=ci.example.com \
            --build-arg VITE_FIREBASE_PROJECT_ID=ci-project \
            --build-arg VITE_GOOGLE_MAPS_API_KEY="" \
            -t ttf-web-ci \
            ./web

  api-build:
    name: API build
    needs: changes
    if: needs.changes.outputs.api == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Docker build and compile (matches Cloud Run image)
        run: |
          docker build -t ttf-api-ci ./api
          docker run --rm ttf-api-ci python -m compileall -q ttf_api

  ci-ok:
    name: CI
    needs: [changes, web-build, api-build]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Verify build jobs
        run: |
          if [[ "${{ needs.web-build.result }}" == "failure" ]]; then
            echo "::error::Web Docker build failed"
            exit 1
          fi
          if [[ "${{ needs.api-build.result }}" == "failure" ]]; then
            echo "::error::API Docker build failed"
            exit 1
          fi
          echo "CI passed (web=${{ needs.changes.outputs.web }}, api=${{ needs.changes.outputs.api }})"
