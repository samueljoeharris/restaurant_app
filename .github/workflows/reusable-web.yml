name: Web

# Reusable deploy module — called by deploy.yml; manual redeploy via workflow_dispatch.
on:
  workflow_call:
  workflow_dispatch:

env:
  PROJECT_ID: ttf-restaurant-dev
  REGION: us-central1
  AR_REPO: ttf-containers
  IMAGE_NAME: ttf-web
  CLOUD_RUN_SERVICE: ttf-web
  API_SERVICE: ttf-api

concurrency:
  group: web-dev-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-push-deploy:
    name: Build, push, deploy (dev)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - id: auth
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_DEPLOY_SERVICE_ACCOUNT }}
          token_format: access_token

      - uses: google-github-actions/setup-gcloud@v3

      - name: Login to Artifact Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGION }}-docker.pkg.dev
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}

      - name: Resolve Vite build env
        id: env
        run: |
          set -euo pipefail

          API_URL=""
          if API_JSON="$(gcloud secrets versions access latest \
            --secret=ttf-api-public-url \
            --project="${{ env.PROJECT_ID }}" 2>/dev/null)"; then
            API_URL="$API_JSON"
          fi
          if [[ -z "$API_URL" ]]; then
            API_URL="$(gcloud run services describe "${{ env.API_SERVICE }}" \
              --region="${{ env.REGION }}" \
              --project="${{ env.PROJECT_ID }}" \
              --format='value(status.url)')"
          fi
          if [[ -z "$API_URL" ]]; then
            echo "::error::API URL not found (ttf-api-public-url secret or Cloud Run service)"
            exit 1
          fi

          if ! FIREBASE_JSON="$(gcloud secrets versions access latest \
            --secret=ttf-firebase-web-env \
            --project="${{ env.PROJECT_ID }}" 2>&1)"; then
            echo "::error::Could not read Secret Manager secret ttf-firebase-web-env"
            echo "$FIREBASE_JSON"
            echo "Run the Terraform workflow on main first (creates the secret and deploy IAM)."
            exit 1
          fi

          RECAPTCHA_SITE_KEY=""
          if RECAPTCHA_JSON="$(gcloud secrets versions access latest \
            --secret=ttf-recaptcha-site-key \
            --project="${{ env.PROJECT_ID }}" 2>/dev/null)"; then
            RECAPTCHA_SITE_KEY="$RECAPTCHA_JSON"
          fi

          MAPS_API_KEY=""
          if MAPS_JSON="$(gcloud secrets versions access latest \
            --secret=ttf-maps-web-api-key \
            --project="${{ env.PROJECT_ID }}" 2>/dev/null)"; then
            MAPS_API_KEY="$MAPS_JSON"
          fi

          ADMIN_APP_URL="https://admin.dev.littlescout.app"
          if ADMIN_JSON="$(gcloud secrets versions access latest \
            --secret=ttf-admin-public-url \
            --project="${{ env.PROJECT_ID }}" 2>/dev/null)"; then
            ADMIN_APP_URL="$ADMIN_JSON"
          fi

          WEB_PUBLIC_URL=""
          if WEB_JSON="$(gcloud secrets versions access latest \
            --secret=ttf-web-public-url \
            --project="${{ env.PROJECT_ID }}" 2>/dev/null)"; then
            WEB_PUBLIC_URL="$WEB_JSON"
          fi

          export API_URL FIREBASE_JSON RECAPTCHA_SITE_KEY MAPS_API_KEY ADMIN_APP_URL WEB_PUBLIC_URL
          python3 <<'PY'
          import json, os
          from urllib.parse import urlparse

          cfg = json.loads(os.environ["FIREBASE_JSON"])
          api_url = os.environ["API_URL"]
          recaptcha = os.environ.get("RECAPTCHA_SITE_KEY", "").strip()
          maps_key = os.environ.get("MAPS_API_KEY", "").strip()
          admin_app_url = os.environ.get("ADMIN_APP_URL", "").strip()
          web_public_url = os.environ.get("WEB_PUBLIC_URL", "").strip()
          auth_domain = cfg["VITE_FIREBASE_AUTH_DOMAIN"]
          if web_public_url:
              host = urlparse(web_public_url).netloc
              if host:
                  auth_domain = host
          with open(os.environ["GITHUB_OUTPUT"], "a") as out:
              out.write(f"api_url={api_url}\n")
              out.write(f"firebase_api_key={cfg['VITE_FIREBASE_API_KEY']}\n")
              out.write(f"firebase_auth_domain={auth_domain}\n")
              out.write(f"firebase_project_id={cfg['VITE_FIREBASE_PROJECT_ID']}\n")
              out.write(f"recaptcha_site_key={recaptcha}\n")
              out.write(f"maps_api_key={maps_key}\n")
              out.write(f"admin_app_url={admin_app_url}\n")
          PY

      - name: Build image
        run: |
          IMAGE_BASE="${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.AR_REPO }}/${{ env.IMAGE_NAME }}"
          docker build \
            --build-arg VITE_API_URL="${{ steps.env.outputs.api_url }}" \
            --build-arg VITE_ADMIN_APP_URL="${{ steps.env.outputs.admin_app_url }}" \
            --build-arg VITE_FIREBASE_API_KEY="${{ steps.env.outputs.firebase_api_key }}" \
            --build-arg VITE_FIREBASE_AUTH_DOMAIN="${{ steps.env.outputs.firebase_auth_domain }}" \
            --build-arg VITE_FIREBASE_PROJECT_ID="${{ steps.env.outputs.firebase_project_id }}" \
            --build-arg VITE_APP_CHECK_RECAPTCHA_SITE_KEY="${{ steps.env.outputs.recaptcha_site_key }}" \
            --build-arg VITE_GOOGLE_MAPS_API_KEY="${{ steps.env.outputs.maps_api_key }}" \
            --build-arg VITE_ENABLE_REVIEW_CHAT=true \
            -t "${IMAGE_BASE}:${{ github.sha }}" \
            -t "${IMAGE_BASE}:latest" \
            ./web
          echo "IMAGE_URI=${IMAGE_BASE}:${{ github.sha }}" >> "$GITHUB_ENV"

      - name: Push image
        run: |
          IMAGE_BASE="${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.AR_REPO }}/${{ env.IMAGE_NAME }}"
          docker push "${IMAGE_BASE}:${{ github.sha }}"
          docker push "${IMAGE_BASE}:latest"

      - name: Deploy to Cloud Run
        run: |
          if ! gcloud run services describe "${{ env.CLOUD_RUN_SERVICE }}" \
            --region="${{ env.REGION }}" \
            --project="${{ env.PROJECT_ID }}" \
            --format="value(name)" 2>/dev/null; then
            echo "Cloud Run service not found — image pushed only."
            echo "Run Terraform apply (enable_web_cloud_run) first, then re-run this workflow."
            exit 0
          fi
          gcloud run services update "${{ env.CLOUD_RUN_SERVICE }}" \
            --region="${{ env.REGION }}" \
            --project="${{ env.PROJECT_ID }}" \
            --image="${IMAGE_URI}"
