name: Admin Web

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "web/**"
      - ".github/workflows/admin-web.yml"

env:
  PROJECT_ID: ttf-restaurant-dev
  REGION: us-central1
  AR_REPO: ttf-containers
  IMAGE_NAME: ttf-admin-web
  CLOUD_RUN_SERVICE: ttf-admin-web
  API_SERVICE: ttf-api

concurrency:
  group: admin-web-dev-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-push-deploy:
    name: Build, push, deploy admin (dev)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - id: auth
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_DEPLOY_SERVICE_ACCOUNT }}
          token_format: access_token

      - uses: google-github-actions/setup-gcloud@v3

      - name: Login to Artifact Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGION }}-docker.pkg.dev
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}

      - name: Resolve Vite build env
        id: env
        run: |
          set -euo pipefail

          API_URL=""
          if API_JSON="$(gcloud secrets versions access latest \
            --secret=ttf-api-public-url \
            --project="${{ env.PROJECT_ID }}" 2>/dev/null)"; then
            API_URL="$API_JSON"
          fi
          if [[ -z "$API_URL" ]]; then
            API_URL="$(gcloud run services describe "${{ env.API_SERVICE }}" \
              --region="${{ env.REGION }}" \
              --project="${{ env.PROJECT_ID }}" \
              --format='value(status.url)')"
          fi
          if [[ -z "$API_URL" ]]; then
            echo "::error::API URL not found (ttf-api-public-url secret or Cloud Run service)"
            exit 1
          fi

          PUBLIC_APP_URL="https://app.dev.littlescout.app"
          if WEB_JSON="$(gcloud secrets versions access latest \
            --secret=ttf-web-public-url \
            --project="${{ env.PROJECT_ID }}" 2>/dev/null)"; then
            PUBLIC_APP_URL="$WEB_JSON"
          fi

          if ! FIREBASE_JSON="$(gcloud secrets versions access latest \
            --secret=ttf-firebase-web-env \
            --project="${{ env.PROJECT_ID }}" 2>&1)"; then
            echo "::error::Could not read ttf-firebase-web-env"
            exit 1
          fi

          export API_URL PUBLIC_APP_URL FIREBASE_JSON
          python3 <<'PY'
          import json, os
          cfg = json.loads(os.environ["FIREBASE_JSON"])
          with open(os.environ["GITHUB_OUTPUT"], "a") as out:
              out.write(f"api_url={os.environ['API_URL']}\n")
              out.write(f"public_app_url={os.environ['PUBLIC_APP_URL']}\n")
              out.write(f"firebase_api_key={cfg['VITE_FIREBASE_API_KEY']}\n")
              out.write(f"firebase_auth_domain={cfg['VITE_FIREBASE_AUTH_DOMAIN']}\n")
              out.write(f"firebase_project_id={cfg['VITE_FIREBASE_PROJECT_ID']}\n")
          PY

      - name: Build image
        run: |
          IMAGE_BASE="${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.AR_REPO }}/${{ env.IMAGE_NAME }}"
          docker build \
            -f ./web/Dockerfile.admin \
            --build-arg VITE_API_URL="${{ steps.env.outputs.api_url }}" \
            --build-arg VITE_PUBLIC_APP_URL="${{ steps.env.outputs.public_app_url }}" \
            --build-arg VITE_FIREBASE_API_KEY="${{ steps.env.outputs.firebase_api_key }}" \
            --build-arg VITE_FIREBASE_AUTH_DOMAIN="${{ steps.env.outputs.firebase_auth_domain }}" \
            --build-arg VITE_FIREBASE_PROJECT_ID="${{ steps.env.outputs.firebase_project_id }}" \
            -t "${IMAGE_BASE}:${{ github.sha }}" \
            -t "${IMAGE_BASE}:latest" \
            ./web
          echo "IMAGE_URI=${IMAGE_BASE}:${{ github.sha }}" >> "$GITHUB_ENV"

      - name: Push image
        run: |
          IMAGE_BASE="${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.AR_REPO }}/${{ env.IMAGE_NAME }}"
          docker push "${IMAGE_BASE}:${{ github.sha }}"
          docker push "${IMAGE_BASE}:latest"

      - name: Deploy to Cloud Run
        run: |
          if ! gcloud run services describe "${{ env.CLOUD_RUN_SERVICE }}" \
            --region="${{ env.REGION }}" \
            --project="${{ env.PROJECT_ID }}" \
            --format="value(name)" 2>/dev/null; then
            echo "Cloud Run service ttf-admin-web not found — image pushed only."
            echo "Run Terraform apply (enable_admin_cloud_run) first, then re-run this workflow."
            exit 0
          fi
          gcloud run services update "${{ env.CLOUD_RUN_SERVICE }}" \
            --region="${{ env.REGION }}" \
            --project="${{ env.PROJECT_ID }}" \
            --image="${IMAGE_URI}"
