name: Terraform

# Called by deploy.yml on push to main (infra/** changes); manual apply via workflow_dispatch.
on:
  workflow_call:
  workflow_dispatch:
    inputs:
      apply:
        description: Run terraform apply after plan (main branch only)
        required: false
        default: false
        type: boolean

concurrency:
  group: terraform-dev-${{ github.ref }}
  cancel-in-progress: false

jobs:
  plan:
    name: Terraform Plan (dev)
    runs-on: ubuntu-latest
    environment: dev
    permissions:
      contents: read
      id-token: write
    defaults:
      run:
        working-directory: infra/terraform/environments/dev
    steps:
      - uses: actions/checkout@v6

      - uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_TERRAFORM_SERVICE_ACCOUNT }}

      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: 1.9.0

      - name: Terraform Init
        run: terraform init -input=false

      - name: Terraform Plan
        env:
          TF_VAR_iap_oauth_client_id: ${{ secrets.IAP_OAUTH_CLIENT_ID }}
          TF_VAR_iap_oauth_client_secret: ${{ secrets.IAP_OAUTH_CLIENT_SECRET }}
        run: terraform plan -input=false -no-color -var-file=ci.tfvars -out=tfplan
        id: plan

      - name: Stage plan artifact
        run: cp tfplan "$RUNNER_TEMP/tfplan"

      - name: Upload plan artifact
        uses: actions/upload-artifact@v7
        with:
          name: terraform-plan-dev
          path: ${{ runner.temp }}/tfplan
          if-no-files-found: error
          retention-days: 5

  apply:
    name: Terraform Apply (dev)
    needs: plan
    if: >-
      needs.plan.result == 'success' &&
      github.ref == 'refs/heads/main' &&
      (github.event_name == 'push' ||
       (github.event_name == 'workflow_dispatch' && inputs.apply == true))
    runs-on: ubuntu-latest
    environment: dev
    permissions:
      contents: read
      id-token: write
    defaults:
      run:
        working-directory: infra/terraform/environments/dev
    steps:
      - uses: actions/checkout@v6

      - uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_TERRAFORM_SERVICE_ACCOUNT }}

      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: 1.9.0

      - name: Terraform Init
        run: terraform init -input=false

      - name: Download plan
        uses: actions/download-artifact@v8
        with:
          name: terraform-plan-dev
          path: infra/terraform/environments/dev

      - name: Terraform Apply
        run: |
          if [[ ! -f tfplan ]]; then
            echo "::error::tfplan missing in $(pwd)"
            find "$GITHUB_WORKSPACE" -name tfplan -type f || true
            exit 1
          fi
          terraform apply -auto-approve -input=false -no-color tfplan
