name: Terraform

on:
  workflow_dispatch:
    inputs:
      apply:
        description: Run terraform apply after plan (main branch only)
        required: false
        default: false
        type: boolean
  pull_request:
    paths:
      - "infra/**"
      - ".github/workflows/terraform.yml"
  push:
    branches: [main]
    paths:
      - "infra/**"
      - ".github/workflows/terraform.yml"

concurrency:
  group: terraform-dev-${{ github.ref }}
  cancel-in-progress: false

jobs:
  plan:
    name: Terraform Plan (dev)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    defaults:
      run:
        working-directory: infra/terraform/environments/dev
    steps:
      - uses: actions/checkout@v6

      - uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_TERRAFORM_SERVICE_ACCOUNT }}

      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: 1.9.0

      - name: Terraform Init
        run: terraform init -input=false

      - name: Terraform Plan
        run: terraform plan -input=false -no-color -var-file=ci.tfvars -out=tfplan
        id: plan

      - name: Upload plan artifact
        uses: actions/upload-artifact@v7
        with:
          name: terraform-plan-dev
          path: infra/terraform/environments/dev/tfplan
          retention-days: 5

  apply:
    name: Terraform Apply (dev)
    needs: plan
    if: >-
      needs.plan.result == 'success' &&
      github.ref == 'refs/heads/main' &&
      (github.event_name == 'push' ||
       (github.event_name == 'workflow_dispatch' && inputs.apply == true))
    runs-on: ubuntu-latest
    environment: dev
    permissions:
      contents: read
      id-token: write
    defaults:
      run:
        working-directory: infra/terraform/environments/dev
    steps:
      - uses: actions/checkout@v6

      - uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_TERRAFORM_SERVICE_ACCOUNT }}

      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: 1.9.0

      - name: Terraform Init
        run: terraform init -input=false

      - name: Download plan
        uses: actions/download-artifact@v8
        with:
          name: terraform-plan-dev

      - name: Terraform Apply
        run: terraform apply -auto-approve -input=false -no-color tfplan
