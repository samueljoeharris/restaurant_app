name: Terraform

# Local apply only for now (docker compose run terraform ... apply).
# This workflow is disabled until GCP_SA_KEY is in GitHub Secrets.
# To enable CI: uncomment pull_request/push triggers below and remove `if: false` on plan.
on:
  workflow_dispatch:
  # pull_request:
  #   paths:
  #     - "infra/**"
  # push:
  #   branches: [main]
  #   paths:
  #     - "infra/**"

permissions:
  contents: read
  pull-requests: write

jobs:
  plan:
    name: Terraform Plan (dev)
    if: false # Re-enable when GCP_SA_KEY is configured
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra/terraform/environments/dev
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.0

      - name: Terraform Init
        run: terraform init -input=false
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GCP_SA_KEY }}

      - name: Terraform Plan
        run: terraform plan -input=false -no-color
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GCP_SA_KEY }}

  # Uncomment when ready for automated apply on merge to main
  # apply:
  #   name: Terraform Apply (dev)
  #   needs: plan
  #   if: github.ref == 'refs/heads/main' && github.event_name == 'push'
  #   runs-on: ubuntu-latest
  #   environment: dev
  #   defaults:
