name: API

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "api/**"
      - ".github/workflows/api.yml"

env:
  PROJECT_ID: ttf-restaurant-dev
  REGION: us-central1
  AR_REPO: ttf-containers
  IMAGE_NAME: ttf-api
  CLOUD_RUN_SERVICE: ttf-api

concurrency:
  group: api-dev-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-push-deploy:
    name: Build, push, deploy (dev)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_DEPLOY_SERVICE_ACCOUNT }}
          token_format: access_token

      - uses: google-github-actions/setup-gcloud@v2

      - name: Login to Artifact Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGION }}-docker.pkg.dev
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}

      - name: Build image
        run: |
          IMAGE_BASE="${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.AR_REPO }}/${{ env.IMAGE_NAME }}"
          docker build -t "${IMAGE_BASE}:${{ github.sha }}" -t "${IMAGE_BASE}:latest" ./api
          echo "IMAGE_URI=${IMAGE_BASE}:${{ github.sha }}" >> "$GITHUB_ENV"

      - name: Push image
        run: |
          IMAGE_BASE="${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.AR_REPO }}/${{ env.IMAGE_NAME }}"
          docker push "${IMAGE_BASE}:${{ github.sha }}"
          docker push "${IMAGE_BASE}:latest"

      - name: Deploy to Cloud Run
        run: |
          if ! gcloud run services describe "${{ env.CLOUD_RUN_SERVICE }}" \
            --region="${{ env.REGION }}" \
            --project="${{ env.PROJECT_ID }}" \
            --format="value(name)" 2>/dev/null; then
            echo "Cloud Run service not found — image pushed only."
            echo "Complete Terraform Phase B apply first, then re-run this workflow."
            exit 0
          fi
          gcloud run services update "${{ env.CLOUD_RUN_SERVICE }}" \
            --region="${{ env.REGION }}" \
            --project="${{ env.PROJECT_ID }}" \
            --image="${IMAGE_URI}"
