name: Terraform

# Reusable deploy module — called by deploy.yml; manual apply via workflow_dispatch.
on:
  workflow_call:
  workflow_dispatch:
    inputs:
      apply:
        description: Run terraform apply after plan (main branch only)
        required: false
        default: false
        type: boolean

concurrency:
  group: terraform-dev-${{ github.ref }}
  cancel-in-progress: false

jobs:
  plan:
    name: Terraform Plan (dev)
    runs-on: ubuntu-latest
    environment: dev
    permissions:
      contents: read
      id-token: write
    defaults:
      run:
        working-directory: infra/terraform/environments/dev
    steps:
      - uses: actions/checkout@v6

      - uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_TERRAFORM_SERVICE_ACCOUNT }}

      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: 1.9.0

      - uses: google-github-actions/setup-gcloud@v3

      - name: Terraform Init
        run: terraform init -input=false

      - name: Resolve IAP OAuth for Terraform
        run: |
          set -euo pipefail
          PROJECT=ttf-restaurant-dev
          if IAP_JSON="$(gcloud secrets versions access latest \
            --secret=ttf-iap-oauth --project="$PROJECT" 2>/dev/null)"; then
            export IAP_JSON
            python3 - <<'PY' >> "$GITHUB_ENV"
          import json, os
          cfg = json.loads(os.environ["IAP_JSON"])
          cid = cfg.get("client_id", "")
          secret = cfg.get("client_secret", "")
          if cid and secret:
              with open(os.environ["GITHUB_ENV"], "a") as out:
                  out.write(f"TF_VAR_iap_oauth_client_id={cid}\n")
                  out.write(f"TF_VAR_iap_oauth_client_secret={secret}\n")
          print("IAP OAuth loaded from Secret Manager (ttf-iap-oauth)")
          PY
          elif [[ -n "${{ secrets.IAP_OAUTH_CLIENT_ID }}" ]]; then
            echo "TF_VAR_iap_oauth_client_id=${{ secrets.IAP_OAUTH_CLIENT_ID }}" >> "$GITHUB_ENV"
            echo "TF_VAR_iap_oauth_client_secret=${{ secrets.IAP_OAUTH_CLIENT_SECRET }}" >> "$GITHUB_ENV"
            echo "IAP OAuth from GitHub Secrets (bootstrap fallback)"
          else
            echo "No IAP OAuth in SM or GitHub Secrets — TF reads SM on apply if iap enabled"
          fi

      - name: Terraform Plan
        run: terraform plan -input=false -no-color -var-file=ci.tfvars -out=tfplan
        id: plan

      - name: Stage plan artifact
        run: cp tfplan "$RUNNER_TEMP/tfplan"

      - name: Upload plan artifact
        uses: actions/upload-artifact@v7
        with:
          name: terraform-plan-dev
          path: ${{ runner.temp }}/tfplan
          if-no-files-found: error
          retention-days: 5

  apply:
    name: Terraform Apply (dev)
    needs: plan
    if: >-
      needs.plan.result == 'success' &&
      github.ref == 'refs/heads/main' &&
      (github.event_name == 'push' ||
       (github.event_name == 'workflow_dispatch' && inputs.apply == true))
    runs-on: ubuntu-latest
    environment: dev
    permissions:
      contents: read
      id-token: write
    defaults:
      run:
        working-directory: infra/terraform/environments/dev
    steps:
      - uses: actions/checkout@v6

      - uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_TERRAFORM_SERVICE_ACCOUNT }}

      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: 1.9.0

      - name: Terraform Init
        run: terraform init -input=false

      - name: Download plan
        uses: actions/download-artifact@v8
        with:
          name: terraform-plan-dev
          path: infra/terraform/environments/dev

      - name: Terraform Apply
        run: |
          if [[ ! -f tfplan ]]; then
            echo "::error::tfplan missing in $(pwd)"
            find "$GITHUB_WORKSPACE" -name tfplan -type f || true
            exit 1
          fi
          terraform apply -auto-approve -input=false -no-color tfplan
