name: iOS

# Manual build tool (workflow_dispatch only).
# Path detection for ios/** is wired in deploy.yml via ci_path_filters.py;
# full Xcode/TestFlight builds stay manual until Phase 3 CI is expanded.
on:
  workflow_dispatch:
    inputs:
      configuration:
        description: Build configuration
        required: true
        default: Debug
        type: choice
        options:
          - Debug
          - Release
      testflight:
        description: Archive, sign, and upload to TestFlight
        required: false
        default: false
        type: boolean

concurrency:
  group: ios-dev-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build iOS app (${{ inputs.configuration }})
    runs-on: macos-15
    defaults:
      run:
        working-directory: ios/TTF
    steps:
      - uses: actions/checkout@v6

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Write GoogleService-Info.plist
        env:
          GOOGLE_SERVICE_INFO_PLIST: ${{ secrets.IOS_GOOGLE_SERVICE_INFO_PLIST }}
        run: |
          if [ -n "$GOOGLE_SERVICE_INFO_PLIST" ]; then
            echo "$GOOGLE_SERVICE_INFO_PLIST" | base64 --decode > TTF/GoogleService-Info.plist
          else
            echo "Warning: IOS_GOOGLE_SERVICE_INFO_PLIST secret not set — Firebase Auth will not be configured" >&2
          fi

      - name: Resolve Swift packages
        run: xcodebuild -resolvePackageDependencies -project TTF.xcodeproj -scheme TTF

      - name: Build for simulator
        run: |
          xcodebuild \
            -project TTF.xcodeproj \
            -scheme TTF \
            -configuration "${{ inputs.configuration }}" \
            -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath DerivedData \
            CODE_SIGNING_ALLOWED=NO \
            build

  # TestFlight archive + upload. Untestable until the issue #46 secrets exist
  # (APPSTORE_*, IOS_DEVELOPMENT_TEAM, IOS_BUILD_CERTIFICATE_BASE64, IOS_P12_PASSWORD,
  # IOS_PROVISION_PROFILE_BASE64). The provisioning profile name in
  # ios/TTF/ExportOptions.plist ("Little Scout App Store") may need a one-time
  # adjustment to match the profile created in the developer portal.
  testflight:
    name: TestFlight upload
    if: ${{ inputs.testflight }}
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v6

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Write GoogleService-Info.plist
        env:
          GOOGLE_SERVICE_INFO_PLIST: ${{ secrets.IOS_GOOGLE_SERVICE_INFO_PLIST }}
        run: |
          if [ -z "$GOOGLE_SERVICE_INFO_PLIST" ]; then
            echo "Error: IOS_GOOGLE_SERVICE_INFO_PLIST secret not set — release builds need Firebase config" >&2
            exit 1
          fi
          echo "$GOOGLE_SERVICE_INFO_PLIST" | base64 --decode > ios/TTF/TTF/GoogleService-Info.plist

      - name: Install Apple certificate and profile
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.IOS_BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.IOS_P12_PASSWORD }}
          BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.IOS_PROVISION_PROFILE_BASE64 }}
        run: ./scripts/import-signing-material.sh

      - name: Resolve Swift packages
        run: xcodebuild -resolvePackageDependencies -project ios/TTF/TTF.xcodeproj -scheme TTF

      - name: Archive
        run: |
          xcodebuild archive \
            -project ios/TTF/TTF.xcodeproj \
            -scheme TTF \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath build/TTF.xcarchive \
            DEVELOPMENT_TEAM="${{ secrets.IOS_DEVELOPMENT_TEAM }}" \
            CURRENT_PROJECT_VERSION=${{ github.run_number }}

      - name: Export IPA
        run: |
          xcodebuild -exportArchive \
            -archivePath build/TTF.xcarchive \
            -exportOptionsPlist ios/TTF/ExportOptions.plist \
            -exportPath build/export
          # PRODUCT_NAME is "Little Scout" — normalize to a deterministic path.
          mv build/export/*.ipa build/export/TTF.ipa

      - name: Upload to TestFlight
        uses: apple-actions/upload-testflight-build@v3
        with:
          app-path: build/export/TTF.ipa
          issuer-id: ${{ secrets.APPSTORE_ISSUER_ID }}
          api-key-id: ${{ secrets.APPSTORE_KEY_ID }}
          api-private-key: ${{ secrets.APPSTORE_PRIVATE_KEY }}
