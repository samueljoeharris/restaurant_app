name: iOS

# Manual build tool (workflow_dispatch only) — wire into deploy.yml when ios/** CI is ready.
on:
  workflow_dispatch:
    inputs:
      configuration:
        description: Build configuration
        required: true
        default: Debug
        type: choice
        options:
          - Debug
          - Release

concurrency:
  group: ios-dev-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build iOS app (${{ inputs.configuration }})
    runs-on: macos-14
    defaults:
      run:
        working-directory: ios/TTF
    steps:
      - uses: actions/checkout@v6

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Write GoogleService-Info.plist
        env:
          GOOGLE_SERVICE_INFO_PLIST: ${{ secrets.IOS_GOOGLE_SERVICE_INFO_PLIST }}
        run: |
          if [ -n "$GOOGLE_SERVICE_INFO_PLIST" ]; then
            echo "$GOOGLE_SERVICE_INFO_PLIST" | base64 --decode > TTF/GoogleService-Info.plist
          else
            echo "Warning: IOS_GOOGLE_SERVICE_INFO_PLIST secret not set — Firebase Auth will not be configured" >&2
          fi

      - name: Resolve Swift packages
        run: xcodebuild -resolvePackageDependencies -project TTF.xcodeproj -scheme TTF

      - name: Build for simulator
        run: |
          xcodebuild \
            -project TTF.xcodeproj \
            -scheme TTF \
            -configuration "${{ inputs.configuration }}" \
            -destination 'platform=iOS Simulator,name=iPhone 15' \
            -derivedDataPath DerivedData \
            CODE_SIGNING_ALLOWED=NO \
            build

