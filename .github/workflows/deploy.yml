name: CI/CD

# Entry-point pipeline (push to main). Reusable deploy modules use the
# reusable-* prefix; manual ops use tool-* — see .github/workflows/README.md.
#
# Path filters: scripts/ci_path_filters.py (single source of truth).
#
# Single pipeline on push to main: checks -> terraform -> build+deploy.
# Fast checks (typecheck, lint, app-import smoke, terraform fmt) gate the
# expensive jobs; each Docker image is built exactly once, in its deploy job,
# with real build args. Service deploys run when their paths changed OR after
# a successful Terraform apply (apply can change env baked into images).
on:
  push:
    branches: [main]

# Supersede stale pipeline runs on rapid pushes; child reusable workflows have
# their own groups (deploy jobs cancel; Terraform apply does not).
concurrency:
  group: deploy-dev-main
  cancel-in-progress: true

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      infra: ${{ steps.filter.outputs.infra }}
      api: ${{ steps.filter.outputs.api }}
      web: ${{ steps.filter.outputs.web }}
      ios: ${{ steps.filter.outputs.ios }}
      tokens: ${{ steps.filter.outputs.tokens }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Detect path changes
        id: filter
        env:
          BEFORE: ${{ github.event.before }}
          AFTER: ${{ github.sha }}
        run: python3 scripts/ci_path_filters.py --github-output

  ci:
    name: CI
    needs: changes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Verify design token outputs
        if: needs.changes.outputs.tokens == 'true'
        run: bash scripts/verify-design-tokens.sh

      # --- Web: typecheck + lint (no bundling — the deploy job builds for real) ---
      - if: needs.changes.outputs.web == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Web install
        if: needs.changes.outputs.web == 'true'
        working-directory: web
        run: |
          npm ci
          npm audit

      - name: Web typecheck
        if: needs.changes.outputs.web == 'true'
        working-directory: web
        run: npx tsc -b

      - name: Web lint
        if: needs.changes.outputs.web == 'true'
        working-directory: web
        run: npm run lint

      # --- API: compile + import the app (catches startup-time failures) ---
      - if: needs.changes.outputs.api == 'true'
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: api/requirements.txt

      - name: API install
        if: needs.changes.outputs.api == 'true'
        working-directory: api
        run: pip install -r requirements.txt

      - name: API compile + app import smoke
        if: needs.changes.outputs.api == 'true'
        working-directory: api
        run: |
          python -m compileall -q ttf_api
          python -c "from ttf_api.main import app; print('app imports ok')"
          python -m unittest tests.test_security_config tests.test_place_id -q

      - name: API dependency audit
        if: needs.changes.outputs.api == 'true'
        working-directory: api
        run: |
          pip install --quiet pip-audit
          pip-audit -r requirements.txt

      - name: Secret scan (gitleaks)
        run: bash scripts/secret-scan.sh detect

      # --- Infra: formatting (plan in the terraform job does full validation) ---
      - if: needs.changes.outputs.infra == 'true'
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: 1.9.0

      - name: Terraform fmt
        if: needs.changes.outputs.infra == 'true'
        run: terraform fmt -check -recursive infra/terraform

      - name: iOS path changed
        if: needs.changes.outputs.ios == 'true'
        run: |
          echo "ios/** or design/** changed — token outputs verified above when applicable."
          echo "Full Xcode build: Actions → iOS → Run workflow (tool-ios.yml)."

  terraform:
    name: Terraform
    needs: [changes, ci]
    if: needs.ci.result == 'success' && needs.changes.outputs.infra == 'true'
    uses: ./.github/workflows/reusable-terraform.yml
    secrets: inherit
    permissions:
      contents: read
      id-token: write

  api:
    name: API
    needs: [changes, ci, terraform]
    if: >-
      always() &&
      needs.ci.result == 'success' &&
      needs.terraform.result != 'failure' &&
      needs.terraform.result != 'cancelled' &&
      (needs.changes.outputs.api == 'true' || needs.terraform.result == 'success')
    uses: ./.github/workflows/reusable-api.yml
    secrets: inherit
    permissions:
      contents: read
      id-token: write

  web:
    name: Web
    needs: [changes, ci, terraform]
    if: >-
      always() &&
      needs.ci.result == 'success' &&
      needs.terraform.result != 'failure' &&
      needs.terraform.result != 'cancelled' &&
      (needs.changes.outputs.web == 'true' || needs.terraform.result == 'success')
    uses: ./.github/workflows/reusable-web.yml
    secrets: inherit
    permissions:
      contents: read
      id-token: write

  admin-web:
    name: Admin Web
    needs: [changes, ci, terraform]
    if: >-
      always() &&
      needs.ci.result == 'success' &&
      needs.terraform.result != 'failure' &&
      needs.terraform.result != 'cancelled' &&
      (needs.changes.outputs.web == 'true' || needs.terraform.result == 'success')
    uses: ./.github/workflows/reusable-admin-web.yml
    secrets: inherit
    permissions:
      contents: read
      id-token: write
