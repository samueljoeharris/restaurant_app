services:
  terraform:
    image: hashicorp/terraform:1.9
    working_dir: /infra
    volumes:
      - ./infra/terraform:/infra
      # Mount gcloud ADC so Terraform can authenticate (Windows + Docker Desktop)
      - ${USERPROFILE}/AppData/Roaming/gcloud:/root/.config/gcloud:ro
    entrypoint: ["terraform"]

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ttf
      POSTGRES_USER: ttf_app
      POSTGRES_PASSWORD: ttf_local
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ttf_app -d ttf"]
      interval: 5s
      timeout: 5s
      retries: 5

  firebase-emulator:
    build:
      context: .
      dockerfile: firebase/Dockerfile
    ports:
      - "9099:9099"
      - "4000:4000"

  api:
    build: ./api
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://ttf_app:ttf_local@postgres:5432/ttf
      PILOT_CITY: dedham-ma
      PILOT_DISPLAY_NAME: Dedham, Massachusetts
      FIREBASE_PROJECT_ID: ttf-restaurant-dev
      FIREBASE_AUTH_EMULATOR_HOST: firebase-emulator:9099
      AUTH_DEV_MODE: "true"
      CORS_ORIGINS: '["http://localhost:5173","http://localhost:5174","http://localhost:3000"]'
    depends_on:
      postgres:
        condition: service_healthy
      firebase-emulator:
        condition: service_started

volumes:
  postgres-data:
