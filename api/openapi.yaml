openapi: 3.1.0
info:
  title: Little Scout API
  description: |
    Little Scout — social restaurant ratings for parents and caregivers.
    Pilot metro: Dedham, Massachusetts (`pilot_city=dedham-ma`).
  version: 0.1.0

servers:
  - url: http://localhost:8080
    description: Local Docker Compose

tags:
  - name: health
  - name: restaurants
  - name: places
  - name: metrics

paths:
  /health:
    get:
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: API is running
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  /v1/restaurants:
    get:
      tags: [restaurants]
      summary: List restaurants in pilot city
      parameters:
        - name: q
          in: query
          schema: { type: string }
          description: Name search
        - name: cuisine
          in: query
          schema: { type: string }
          description: Filter by cuisine tag
      responses:
        "200":
          description: Restaurant list
          headers:
            ETag: { $ref: "#/components/headers/ETag" }
            Cache-Control: { $ref: "#/components/headers/CacheControl" }
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RestaurantSummary"
        "304":
          $ref: "#/components/responses/NotModified"
    post:
      tags: [restaurants]
      summary: Add restaurant (authenticated)
      security: [{ firebase: [] }]
      responses:
        "501":
          description: Not implemented — Firebase Auth required

  /v1/restaurants/map:
    get:
      tags: [restaurants]
      summary: Map entries with TTF/note/attribute counts
      description: |
        Returns restaurants with aggregated stats for the map view. An optional
        viewport bounding box narrows results; all four bounds must be supplied
        together (or none, for the whole pilot city).
      parameters:
        - name: min_lat
          in: query
          schema: { type: number, format: double, minimum: -90, maximum: 90 }
          description: South edge of viewport (requires all four bounds)
        - name: max_lat
          in: query
          schema: { type: number, format: double, minimum: -90, maximum: 90 }
          description: North edge of viewport (requires all four bounds)
        - name: min_lng
          in: query
          schema: { type: number, format: double, minimum: -180, maximum: 180 }
          description: West edge of viewport (requires all four bounds)
        - name: max_lng
          in: query
          schema: { type: number, format: double, minimum: -180, maximum: 180 }
          description: East edge of viewport (requires all four bounds)
      responses:
        "200":
          description: Map entries
          headers:
            ETag: { $ref: "#/components/headers/ETag" }
            Cache-Control: { $ref: "#/components/headers/CacheControl" }
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RestaurantMapEntry"
        "304":
          $ref: "#/components/responses/NotModified"
        "422":
          description: Invalid bbox (partial bounds or min not less than max)

  /v1/restaurants/seed-jobs:
    post:
      tags: [restaurants]
      summary: Start a background restaurant seed job for a ZIP, city, or coordinates
      security: [{ firebase: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RestaurantSeedJobRequest"
      responses:
        "202":
          description: Seed job accepted or reused
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RestaurantSeedJobResponse"
        "400":
          description: Invalid or un-geocodable location
        "503":
          description: Server-side Maps key is not configured

  /v1/restaurants/seed-jobs/{job_id}:
    get:
      tags: [restaurants]
      summary: Poll a restaurant seed job
      security: [{ firebase: [] }]
      parameters:
        - name: job_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Seed job status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RestaurantSeedJobResponse"
        "404":
          description: Seed job not found

  /v1/restaurants/{id}:
    get:
      tags: [restaurants]
      summary: Restaurant detail with TTF aggregates
      parameters:
        - $ref: "#/components/parameters/RestaurantId"
      responses:
        "200":
          description: Restaurant detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RestaurantDetailResponse"
        "404":
          description: Not found

  /v1/restaurants/{id}/ttf:
    get:
      tags: [restaurants]
      summary: Aggregated TTF stats
      parameters:
        - $ref: "#/components/parameters/RestaurantId"
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TtfAggregate"
    post:
      tags: [restaurants]
      summary: Submit TTF observation (authenticated)
      security: [{ firebase: [] }]
      parameters:
        - $ref: "#/components/parameters/RestaurantId"
      responses:
        "501":
          description: Not implemented — Firebase Auth required

  /v1/restaurants/{id}/attributes:
    get:
      tags: [restaurants]
      summary: Aggregated attribute ratings
      parameters:
        - $ref: "#/components/parameters/RestaurantId"
      responses:
        "200":
          description: Attribute aggregates (stub)
    post:
      tags: [restaurants]
      summary: Submit attribute rating (authenticated)
      security: [{ firebase: [] }]
      parameters:
        - $ref: "#/components/parameters/RestaurantId"
      responses:
        "501":
          description: Not implemented — Firebase Auth required

  /v1/restaurants/{id}/notes:
    get:
      tags: [restaurants]
      summary: List restaurant notes
      parameters:
        - $ref: "#/components/parameters/RestaurantId"
      responses:
        "200":
          description: Notes list
    post:
      tags: [restaurants]
      summary: Add note (authenticated)
      security: [{ firebase: [] }]
      parameters:
        - $ref: "#/components/parameters/RestaurantId"
      responses:
        "501":
          description: Not implemented — Firebase Auth required

  /v1/restaurants/search:
    get:
      tags: [restaurants]
      summary: Radius query — restaurants near a point, sorted by distance
      description: |
        Public (no auth). Returns `RestaurantMapEntry` rows within `radius_m` of
        the given coordinates, ordered by Haversine distance ascending.
      parameters:
        - name: lat
          in: query
          required: true
          schema: { type: number, format: double }
          description: Center latitude
        - name: lng
          in: query
          required: true
          schema: { type: number, format: double }
          description: Center longitude
        - name: radius_m
          in: query
          schema: { type: integer, default: 8000, minimum: 500, maximum: 25000 }
          description: Search radius in metres (clamped 500–25000)
        - name: q
          in: query
          schema: { type: string }
          description: Optional name filter (ILIKE)
        - name: limit
          in: query
          schema: { type: integer, default: 100, minimum: 1, maximum: 250 }
          description: Max results (clamped 1–250)
      responses:
        "200":
          description: Distance-sorted restaurant list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RestaurantMapEntry"

  /v1/places/autocomplete:
    get:
      tags: [places]
      summary: Typeahead — catalog restaurant hits + Google place predictions
      description: |
        Returns up to 5 matching restaurants from our catalog followed by up to 5
        Google Places Autocomplete predictions. Degrades gracefully when
        `MAPS_API_KEY` is absent (returns catalog hits only).
      security: [{ firebase: [] }]
      parameters:
        - name: q
          in: query
          required: true
          schema: { type: string, minLength: 1 }
          description: Partial search input
        - name: session_token
          in: query
          required: true
          schema: { type: string }
          description: Client-generated UUID; one per typing session (Google session billing)
        - name: lat
          in: query
          schema: { type: number, format: double }
          description: Location bias latitude (optional)
        - name: lng
          in: query
          schema: { type: number, format: double }
          description: Location bias longitude (optional)
      responses:
        "200":
          description: Mixed restaurant + place suggestions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AutocompleteResponse"
        "401":
          description: Not authenticated
        "403":
          description: App Check verification failed

  /v1/places/resolve:
    get:
      tags: [places]
      summary: Resolve a Google place_id to coordinates + label
      description: |
        Proxies Place Details (New). Closes the autocomplete billing session.
      security: [{ firebase: [] }]
      parameters:
        - name: place_id
          in: query
          required: true
          schema: { type: string }
          description: Google place_id to resolve
        - name: session_token
          in: query
          required: true
          schema: { type: string }
          description: Session token from the autocomplete session
      responses:
        "200":
          description: Resolved coordinates and label
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlaceResolveResponse"
        "401":
          description: Not authenticated
        "403":
          description: App Check verification failed
        "404":
          description: Place not found or has no location
        "503":
          description: MAPS_API_KEY not configured

  /v1/places/nearby:
    get:
      tags: [places]
      summary: Nearby restaurants from Google Places merged with Scout catalog
      security: [{ firebase: [] }]
      parameters:
        - name: lat
          in: query
          required: true
          schema: { type: number, format: double, minimum: -90, maximum: 90 }
        - name: lng
          in: query
          required: true
          schema: { type: number, format: double, minimum: -180, maximum: 180 }
        - name: radius_m
          in: query
          schema: { type: integer, minimum: 500, maximum: 25000, default: 8000 }
        - name: limit
          in: query
          schema: { type: integer, minimum: 1, maximum: 20, default: 20 }
      responses:
        "200":
          description: Nearby map entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RestaurantMapEntry"
        "401":
          description: Not authenticated
        "403":
          description: App Check verification failed

  /v1/places/{place_id}/entry:
    get:
      tags: [places]
      summary: Live Google place merged with Scout aggregates
      security: [{ firebase: [] }]
      parameters:
        - name: place_id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Map entry for the place
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RestaurantMapEntry"
        "404":
          description: Place not found

  /v1/places/{place_id}/practical:
    get:
      tags: [places]
      summary: Live Google practical info (hours, phone, rating)
      description: |
        On-demand Place Details (Enterprise SKU fields). Not persisted to Postgres.
        Intended for restaurant detail surfaces only.
      security: [{ firebase: [] }]
      parameters:
        - name: place_id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Practical place info for display
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlacePracticalResponse"
        "401":
          description: Not authenticated
        "403":
          description: App Check verification failed
        "404":
          description: Place not found
        "503":
          description: MAPS_API_KEY not configured

  /v1/places/{place_id}/materialize:
    post:
      tags: [places]
      summary: Upsert a Google place into the Scout catalog
      security: [{ firebase: [] }]
      parameters:
        - name: place_id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Materialized restaurant detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RestaurantDetailResponse"
        "404":
          description: Place not found

  /v1/metrics:
    get:
      tags: [metrics]
      summary: List MetricDefinition seed schema
      responses:
        "200":
          description: Metric definitions
          headers:
            ETag: { $ref: "#/components/headers/ETag" }
            Cache-Control: { $ref: "#/components/headers/CacheControl" }
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MetricDefinition"
        "304":
          $ref: "#/components/responses/NotModified"

components:
  securitySchemes:
    firebase:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Firebase Auth JWT (Apple Sign-In) — Phase 3

  parameters:
    RestaurantId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid

  headers:
    ETag:
      description: Strong validator for conditional requests (If-None-Match).
      schema: { type: string }
      example: '"3a7bd3e2360a3d2a..."'
    CacheControl:
      description: Caching policy for clients and shared caches.
      schema: { type: string }
      example: "public, max-age=30, stale-while-revalidate=300"

  responses:
    NotModified:
      description: |
        Cached copy is still fresh. Returned when If-None-Match matches the
        current ETag. Empty body; ETag and Cache-Control are repeated.
      headers:
        ETag: { $ref: "#/components/headers/ETag" }
        Cache-Control: { $ref: "#/components/headers/CacheControl" }

  schemas:
    HealthResponse:
      type: object
      required: [status, pilot_city, pilot_display_name]
      properties:
        status: { type: string, example: ok }
        pilot_city: { type: string, example: dedham-ma }
        pilot_display_name: { type: string, example: "Dedham, Massachusetts" }

    RestaurantSummary:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        address: { type: string }
        lat: { type: number, format: double }
        lng: { type: number, format: double }
        cuisine_tags: { type: array, items: { type: string } }
        pilot_city: { type: string }
        google_place_id: { type: string, nullable: true }
        google_maps_url: { type: string, nullable: true }

    RestaurantDetail:
      allOf:
        - $ref: "#/components/schemas/RestaurantSummary"
        - type: object
          properties:
            google_place_id: { type: string, nullable: true }
            google_maps_url: { type: string, nullable: true }
            created_at: { type: string, format: date-time }
            updated_at: { type: string, format: date-time }

    TtfAggregate:
      type: object
      properties:
        sample_size: { type: integer }
        median_minutes: { type: number, nullable: true }
        avg_quality: { type: number, nullable: true }
        last_updated: { type: string, format: date-time, nullable: true }

    RestaurantDetailResponse:
      type: object
      properties:
        restaurant: { $ref: "#/components/schemas/RestaurantDetail" }
        ttf: { $ref: "#/components/schemas/TtfAggregate" }

    RestaurantMapEntry:
      allOf:
        - $ref: "#/components/schemas/RestaurantSummary"
        - type: object
          properties:
            ttf: { $ref: "#/components/schemas/TtfAggregate" }
            note_count: { type: integer, default: 0 }
            attribute_rating_count: { type: integer, default: 0 }

    RestaurantSeedJobRequest:
      type: object
      properties:
        location:
          type: string
          nullable: true
          description: ZIP, city/state, or address to geocode before seeding
          example: "02026"
        lat:
          type: number
          format: double
          nullable: true
        lng:
          type: number
          format: double
          nullable: true
        radius_m:
          type: integer
          default: 8000
          minimum: 1000
          maximum: 25000
        force:
          type: boolean
          default: false
      oneOf:
        - required: [location]
        - required: [lat, lng]

    RestaurantSeedJob:
      type: object
      properties:
        id: { type: string, format: uuid }
        pilot_city: { type: string }
        area_key: { type: string }
        query: { type: string, nullable: true }
        lat: { type: number, format: double }
        lng: { type: number, format: double }
        radius_m: { type: integer }
        refresh: { type: boolean }
        status:
          type: string
          enum: [pending, running, succeeded, failed, skipped]
        error: { type: string, nullable: true }
        inserted_count: { type: integer }
        updated_count: { type: integer }
        closed_count: { type: integer }
        outside_area_count: { type: integer }
        skipped_count: { type: integer }
        out_of_area_count: { type: integer }
        unique_places_count: { type: integer }
        started_at: { type: string, format: date-time, nullable: true }
        finished_at: { type: string, format: date-time, nullable: true }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    RestaurantSeedJobResponse:
      type: object
      properties:
        job: { $ref: "#/components/schemas/RestaurantSeedJob" }
        reused: { type: boolean }

    RestaurantMapEntry:
      allOf:
        - $ref: "#/components/schemas/RestaurantSummary"
        - type: object
          properties:
            ttf:
              $ref: "#/components/schemas/TtfAggregate"
            note_count: { type: integer }
            attribute_rating_count: { type: integer }

    PlaceSuggestion:
      type: object
      required: [type, primary_text]
      properties:
        type:
          type: string
          enum: [place, restaurant]
        place_id:
          type: string
          nullable: true
          description: Google place_id (set when type=place)
        restaurant_id:
          type: string
          format: uuid
          nullable: true
          description: Our restaurant id (set when type=restaurant)
        primary_text:
          type: string
          description: Main display text (restaurant name or place name)
        secondary_text:
          type: string
          nullable: true
          description: Supporting text (address or region)
        lat:
          type: number
          format: double
          nullable: true
          description: Restaurant latitude (set when type=restaurant)
        lng:
          type: number
          format: double
          nullable: true
          description: Restaurant longitude (set when type=restaurant)

    AutocompleteResponse:
      type: object
      required: [suggestions]
      properties:
        suggestions:
          type: array
          items:
            $ref: "#/components/schemas/PlaceSuggestion"
          description: Up to 5 restaurant hits followed by up to 5 place predictions

    PlaceResolveResponse:
      type: object
      required: [place_id, lat, lng, label]
      properties:
        place_id: { type: string }
        lat: { type: number, format: double }
        lng: { type: number, format: double }
        label: { type: string, description: "Human-readable place name (formattedAddress)" }

    PlacePracticalResponse:
      type: object
      required: [place_id]
      properties:
        place_id: { type: string }
        open_now: { type: boolean, nullable: true }
        hours_summary: { type: string, nullable: true }
        weekday_hours:
          type: array
          nullable: true
          items: { type: string }
        phone: { type: string, nullable: true }
        website: { type: string, nullable: true }
        google_maps_url: { type: string, nullable: true }
        google_rating: { type: number, format: double, nullable: true }
        google_rating_count: { type: integer, nullable: true }
        business_status: { type: string, nullable: true }

    MetricDefinition:
      type: object
      properties:
        key: { type: string }
        label: { type: string }
        metric_type: { type: string, enum: [boolean, enum, numeric, duration] }
        category: { type: string }
        input_widget: { type: string }
        min_sample_size: { type: integer }
        enum_values: { type: array, items: { type: string }, nullable: true }
        min_value: { type: integer, nullable: true }
        max_value: { type: integer, nullable: true }
