<!-- @dsCard group="Spacing" viewport="700x140" subtitle="4px-base spacing scale" name="Spacing scale" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;font-family:var(--ls-font-display);background:var(--ls-paper);padding:20px}
.row{display:flex;gap:14px;align-items:flex-end}
.lab{font-weight:700;font-size:11px;color:var(--ls-ink-muted);margin-top:6px;text-align:center}
.bar{background:var(--ls-mango);border-radius:4px;width:26px}</style></head>
<body><div class="row">
<div><div class="bar" style="height:4px"></div><div class="lab">1 · 4</div></div>
<div><div class="bar" style="height:8px"></div><div class="lab">2 · 8</div></div>
<div><div class="bar" style="height:12px"></div><div class="lab">3 · 12</div></div>
<div><div class="bar" style="height:16px"></div><div class="lab">4 · 16</div></div>
<div><div class="bar" style="height:24px"></div><div class="lab">6 · 24</div></div>
<div><div class="bar" style="height:32px"></div><div class="lab">8 · 32</div></div>
<div><div class="bar" style="height:40px"></div><div class="lab">10 · 40</div></div>
</div></body></html>
