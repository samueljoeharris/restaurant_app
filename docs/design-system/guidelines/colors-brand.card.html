<!-- @dsCard group="Colors" viewport="700x160" subtitle="Brand sky blue + mango accent + pop" name="Brand & accent" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;font-family:var(--ls-font-body);background:var(--ls-paper);padding:18px}
.row{display:flex;gap:14px;flex-wrap:wrap}
.sw{display:flex;flex-direction:column;gap:6px}
.chip{width:120px;height:58px;border-radius:13px;border:1px solid rgba(0,0,0,.06)}
.n{font-family:var(--ls-font-display);font-weight:700;font-size:13px;color:var(--ls-ink)}
.h{font-family:var(--ls-font-display);font-weight:600;font-size:11px;color:var(--ls-ink-muted)}</style></head>
<body><div class="row">
<div class="sw"><div class="chip" style="background:var(--ls-sky)"></div><div class="n">Sky blue</div><div class="h">--ls-sky · #3FA7D6</div></div>
<div class="sw"><div class="chip" style="background:var(--ls-sky-soft)"></div><div class="n">Sky soft</div><div class="h">--ls-sky-soft · #D6EDF7</div></div>
<div class="sw"><div class="chip" style="background:var(--ls-mango)"></div><div class="n">Mango</div><div class="h">--ls-mango · #FBA63C</div></div>
<div class="sw"><div class="chip" style="background:var(--ls-mango-soft)"></div><div class="n">Mango soft</div><div class="h">--ls-mango-soft · #FCE6C8</div></div>
<div class="sw"><div class="chip" style="background:var(--ls-pop)"></div><div class="n">Pop</div><div class="h">--ls-pop · #F08A2E</div></div>
</div></body></html>
