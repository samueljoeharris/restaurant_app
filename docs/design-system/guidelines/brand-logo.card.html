<!-- @dsCard group="Brand" viewport="700x180" subtitle="The scout compass emblem (geometric, not a character)" name="Logo — scout compass" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;font-family:var(--ls-font-body);background:var(--ls-paper);padding:20px;display:flex;align-items:center;gap:22px}
.emb{width:96px;height:96px;border-radius:28px;background:var(--ls-sky);box-shadow:0 10px 26px rgba(63,167,214,.3);display:flex;align-items:center;justify-content:center}
.eye{width:60px;height:60px;border-radius:50%;background:var(--ls-paper);position:relative;display:flex;align-items:center;justify-content:center}
.d{width:22px;height:22px;transform:rotate(45deg);border-radius:5px;position:absolute}</style></head>
<body>
<div class="emb"><div class="eye">
<div class="d" style="background:var(--ls-pop);top:8px"></div>
<div class="d" style="background:var(--ls-mango);bottom:8px"></div>
<div style="width:10px;height:10px;border-radius:50%;background:var(--ls-ink);z-index:2"></div>
</div></div>
<div>
<div style="font-family:var(--ls-font-display);font-weight:700;font-size:28px;color:var(--ls-ink)">Little Scout</div>
<div style="font-weight:600;font-size:13px;color:var(--ls-ink-muted);max-width:380px;line-height:1.5;margin-top:6px">A compass needle, not a literal character — scales from 16px favicon to map pin. Sky badge = trust; mango needle = the playful spark. Pair with an illustrated mascot for onboarding/empty states (supply art; don't auto-generate).</div>
</div>
</body></html>
