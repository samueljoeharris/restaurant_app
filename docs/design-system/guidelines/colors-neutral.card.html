<!-- @dsCard group="Colors" viewport="700x160" subtitle="Warm-ivory neutrals + ink" name="Neutrals & ink" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;font-family:var(--ls-font-body);background:var(--ls-paper);padding:18px}
.row{display:flex;gap:14px;flex-wrap:wrap}
.sw{display:flex;flex-direction:column;gap:6px}
.chip{width:108px;height:58px;border-radius:13px;border:1px solid var(--ls-border)}
.n{font-family:var(--ls-font-display);font-weight:700;font-size:13px;color:var(--ls-ink)}
.h{font-family:var(--ls-font-display);font-weight:600;font-size:11px;color:var(--ls-ink-muted)}</style></head>
<body><div class="row">
<div class="sw"><div class="chip" style="background:var(--ls-paper)"></div><div class="n">Paper</div><div class="h">#FBF6EC</div></div>
<div class="sw"><div class="chip" style="background:var(--ls-surface)"></div><div class="n">Surface</div><div class="h">#FFFFFF</div></div>
<div class="sw"><div class="chip" style="background:var(--ls-surface-muted)"></div><div class="n">Muted</div><div class="h">#F3EAD8</div></div>
<div class="sw"><div class="chip" style="background:var(--ls-border)"></div><div class="n">Border</div><div class="h">#EADFC9</div></div>
<div class="sw"><div class="chip" style="background:var(--ls-ink)"></div><div class="n" style="color:#fff;position:relative;top:-40px;left:10px">Ink</div><div class="h" style="position:relative;top:-40px;left:10px">#2C2722</div></div>
</div></body></html>
