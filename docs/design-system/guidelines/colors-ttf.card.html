<!-- @dsCard group="Colors" viewport="700x170" subtitle="Kid-food-speed tiers — semantic, theme-constant" name="TTF speed tiers" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;font-family:var(--ls-font-body);background:var(--ls-paper);padding:18px}
.row{display:flex;gap:14px;flex-wrap:wrap}
.sw{display:flex;flex-direction:column;gap:6px}
.chip{width:128px;height:54px;border-radius:13px;display:flex;align-items:center;justify-content:center}
.dot{width:14px;height:14px;border-radius:50%;background:#fff;box-shadow:0 1px 2px rgba(0,0,0,.25)}
.n{font-family:var(--ls-font-display);font-weight:700;font-size:13px;color:var(--ls-ink)}
.h{font-family:var(--ls-font-display);font-weight:600;font-size:11px;color:var(--ls-ink-muted)}</style></head>
<body><div class="row">
<div class="sw"><div class="chip" style="background:var(--ls-ttf-fast)"><span class="dot"></span></div><div class="n">Fast ≤8m</div><div class="h">--ls-ttf-fast · #2E8B57</div></div>
<div class="sw"><div class="chip" style="background:var(--ls-ttf-ok)"><span class="dot"></span></div><div class="n">OK 9–15m</div><div class="h">--ls-ttf-ok · #E0A52E</div></div>
<div class="sw"><div class="chip" style="background:var(--ls-ttf-slow)"><span class="dot"></span></div><div class="n">Slow &gt;15m</div><div class="h">--ls-ttf-slow · #D6543B</div></div>
<div class="sw"><div class="chip" style="background:var(--ls-ttf-none)"><span class="dot"></span></div><div class="n">No data</div><div class="h">--ls-ttf-none · #B4AA98</div></div>
</div></body></html>
