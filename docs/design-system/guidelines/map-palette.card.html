<!-- @dsCard group="Brand" viewport="700x150" subtitle="Themed map basemap layer colors" name="Map basemap palette" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;font-family:var(--ls-font-body);background:var(--ls-paper);padding:18px}
.row{display:flex;gap:16px;flex-wrap:wrap}
.sw{display:flex;align-items:center;gap:9px}
.chip{width:34px;height:34px;border-radius:9px;border:1px solid var(--ls-border)}
.n{font-family:var(--ls-font-display);font-weight:700;font-size:12px;color:var(--ls-ink)}
.h{font-family:var(--ls-font-display);font-weight:600;font-size:10.5px;color:var(--ls-ink-muted)}</style></head>
<body><div class="row">
<div class="sw"><span class="chip" style="background:var(--ls-map-land)"></span><div><div class="n">Land</div><div class="h">#F6EFE1</div></div></div>
<div class="sw"><span class="chip" style="background:var(--ls-map-water)"></span><div><div class="n">Water</div><div class="h">#CDE7F4</div></div></div>
<div class="sw"><span class="chip" style="background:var(--ls-map-park)"></span><div><div class="n">Parks</div><div class="h">#DCEAD2</div></div></div>
<div class="sw"><span class="chip" style="background:var(--ls-map-road-major)"></span><div><div class="n">Major rd</div><div class="h">#F0E2C2</div></div></div>
<div class="sw"><span class="chip" style="background:var(--ls-map-road-minor)"></span><div><div class="n">Minor rd</div><div class="h">#EFE7D6</div></div></div>
<div class="sw"><span class="chip" style="background:var(--ls-map-label)"></span><div><div class="n">Labels</div><div class="h">#8A98A0</div></div></div>
</div>
<div style="font-family:var(--ls-font-body);font-weight:700;font-size:11.5px;color:#9A6A2E;background:var(--ls-mango-soft);border-radius:11px;padding:9px 13px;margin-top:14px;max-width:560px">🔑 Hide POI/business icons + transit and thin labels. Then the teardrop tier pins carry the map.</div>
</body></html>
