<!-- @dsCard group="Spacing" viewport="700x170" subtitle="Generous radius + warm-tinted soft shadows" name="Radius & elevation" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;font-family:var(--ls-font-display);background:var(--ls-paper);padding:20px}
.lab{font-weight:700;font-size:11px;color:var(--ls-ink-muted);margin-top:6px;text-align:center}
.row{display:flex;gap:16px;align-items:flex-end}</style></head>
<body><div class="row">
<div><div style="width:50px;height:50px;background:var(--ls-sky-soft);border:1px solid #BFE2F1;border-radius:var(--ls-radius-sm)"></div><div class="lab">sm 8</div></div>
<div><div style="width:50px;height:50px;background:var(--ls-sky-soft);border:1px solid #BFE2F1;border-radius:var(--ls-radius-md)"></div><div class="lab">md 12</div></div>
<div><div style="width:50px;height:50px;background:var(--ls-sky-soft);border:1px solid #BFE2F1;border-radius:var(--ls-radius-lg)"></div><div class="lab">lg 18</div></div>
<div><div style="width:50px;height:50px;background:var(--ls-sky-soft);border:1px solid #BFE2F1;border-radius:var(--ls-radius-full)"></div><div class="lab">full</div></div>
<div style="width:1px;height:56px;background:var(--ls-border)"></div>
<div><div style="width:64px;height:50px;background:#fff;border-radius:14px;box-shadow:var(--ls-shadow-sm)"></div><div class="lab">sm</div></div>
<div><div style="width:64px;height:50px;background:#fff;border-radius:14px;box-shadow:var(--ls-shadow-md)"></div><div class="lab">md</div></div>
<div><div style="width:64px;height:50px;background:#fff;border-radius:14px;box-shadow:var(--ls-shadow-lg)"></div><div class="lab">lg</div></div>
</div></body></html>
