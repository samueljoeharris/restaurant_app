name: TTF
options:
  bundleIdPrefix: com.samueljoeharris
  deploymentTarget:
    iOS: "17.0"
  groupSortPosition: top
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.10"
    PRODUCT_BUNDLE_IDENTIFIER: com.samueljoeharris.ttf
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    TARGETED_DEVICE_FAMILY: "1"
    INFOPLIST_FILE: TTF/Resources/Info.plist
    CODE_SIGN_ENTITLEMENTS: TTF/TTF.entitlements
    ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
    ENABLE_USER_SCRIPT_SANDBOXING: YES
configs:
  Debug: debug
  Release: release
configFiles:
  Debug: Config/Debug.xcconfig
  Release: Config/Release.xcconfig
packages:
  Firebase:
    url: https://github.com/firebase/firebase-ios-sdk.git
    # Pinned (not upToNextMajorVersion): 11.5.0+ uses Swift 6-only syntax
    # that fails to compile on the Xcode 15.4 toolchain our CI runner uses.
    exactVersion: "11.4.0"

targets:
  TTF:
    type: application
    platform: iOS
    sources:
      - path: TTF
        excludes:
          - Resources/Info.plist
    resources:
      - path: TTF/Resources/Assets.xcassets
      - path: TTF/Resources/Colors.xcassets
    entitlements:
      path: TTF/TTF.entitlements
      properties:
        com.apple.developer.applesignin:
          - Default
    dependencies:
      - package: Firebase
        product: FirebaseAuth
      - package: Firebase
        product: FirebaseAppCheck
    settings:
      base:
        PRODUCT_NAME: Little Scout
        CODE_SIGN_ENTITLEMENTS: TTF/TTF.entitlements
    info:
      path: TTF/Resources/Info.plist
      properties:
        CFBundleDisplayName: Little Scout
        UILaunchScreen: {}
        NSLocationWhenInUseUsageDescription: "Little Scout uses your location to show nearby restaurants in the pilot area."
        ITSAppUsesNonExemptEncryption: false

schemes:
  TTF:
    build:
      targets:
        TTF: all
    run:
      config: Debug
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
